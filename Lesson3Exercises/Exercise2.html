<!DOCTYPE html>
<html>
  <head>
    <title>Lesson 3 Exercise 2</title>

  <body>
    <div class="js-container"></div>

    <script>
        console.log("JS from script tag");
    </script>
    <script>
        console.log("JS from script tag");
    </script>
    <script src="/react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script> 

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">
    
    function DisplayAsYouType(){
        const [inputText, setInputText]=React.useState('');
        function onChangeHandler(event){
            setInputText(event.target.value);
        }
        function onClickResetHandler(){
            setInputText('');
        }
        function onClickExampleHandler(){
            setInputText('Sasha');
        }
        return (
            <>
                <input onChange={onChangeHandler} value={inputText}></input>
                <button onClick={onClickResetHandler}>Reset</button>
                <button onClick={onClickExampleHandler}>Example</button>
                <p>Hello, {inputText}</p>
            </>
        );
    }

      function App(){
        return (
            <DisplayAsYouType/>
        );
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App/>);
    </script>
  </body>
</html>
