<!DOCTYPE html>
<html>
  <head>
    <title>Lesson 2 Exercise 1</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script>
        console.log("JS from script tag");
    </script>
    <script src="react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script> 

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">
    function ProductDetails({name,price,discountPrice=0}){

        return(
            <>
                <div>   
                    <p>{name}</p> 
                </div>
                {discountPrice!==0 && (
                    <div>
                        <p><del>Price:${price}</del></p>
                    </div>
                )}
                {discountPrice===0 && (
                    <div>
                        <p>Price:${price}</p>
                    </div>
                )}
                
                {discountPrice!==0 && (
                    <div>
                        <p>
                            Discount Price: ${discountPrice}
                        </p>
                    </div>
                )}

                <button>Add to Cart</button>
            </>
        );
    }

    function ProductDetails_1({name, price, discountPrice=0,imageSrc}){
        const PriceElement = discountPrice!==0 ? <p><del>Price:${price}</del></p> : <p>Price:${price}</p>;
        const discountElement = discountPrice!==0 ? <p>Discount Price: ${discountPrice}</p>:null;
        return (
            <div>
                <img src={imageSrc}/>
                <p>{name}</p>
                {PriceElement}
                {discountElement}
                <button>Add to Cart</button>
            </div>
        );
    }

      function App(){
        return (
            <>
                <ProductDetails_1 name="Cotton Socks" price="10.9" discountPrice={5.45} imageSrc="cotton-socks.png"/>
                <ProductDetails_1 name="Tennis balls" price="6.00" imageSrc="tennis-balls.png"/>
                <ProductDetails_1 name="Plain T-Shirt" price="7.99" imageSrc="plain-t-shirt.png"/>
            </>
        );
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App/>);
      //root.render(div_1c);
      //setInterval(()=>{root.render(<p>Current time:{dayjs().format('HH:mm:ss')}</p>)},1000);
    </script>
  </body>
</html>
