<!DOCTYPE html>
<html>
  <head>
    <title>Lesson 4 Exercise</title>
    <style>
        .onButton{
            padding: 10px;
            background-color: rgb(25,135,84);
            border-radius: 5px;
            color : white;
            border-width: 0;
        }
        .offButton{
            padding: 10px;
            background-color: rgb(220,53,69);
            border-radius: 5px;
            color: white;
            border-width: 0;
        }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script>
        console.log("JS from script tag");
    </script>
    <script>
        console.log("JS from script tag");
    </script>
    <script src="/react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script> 

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">
    
      function App(){
        const [isButtonOn, setIsButton] = React.useState(false);
        function clickHandler(){
            console.log("bhai mera");
            setIsButton(!isButtonOn);
        }

        return (
            <div>
                <button className={isButtonOn === true ? "onButton" : "offButton" } onClick = {clickHandler}>
                    {isButtonOn === true ? 'ON':'OFF'}
                </button>
            </div>
        );
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App/>);
    </script>
  </body>
</html>
